<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dialog Example</title>
</head>
<body>
<button commandFor="dialog" command="show-modal" type="button">
  Open Dialog
</button>

<dialog id="dialog">
  <button commandFor="dialog" command="close" type="button">
    Close Dialog
  </button>
  <!-- dialog content -->
</dialog>
</body>
</html>
