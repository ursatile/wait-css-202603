<script>
document.write(`
  <h2>Browser Details</h2>

  <p><strong>App Name:</strong> ${navigator.appName}</p>
  <p><strong>App Version:</strong> ${navigator.appVersion}</p>

  <p><strong>Cookie Enabled:</strong> ${navigator.cookieEnabled}</p>
  <p><strong>Hardware Concurrency (CPU cores):</strong> ${navigator.hardwareConcurrency}</p>
